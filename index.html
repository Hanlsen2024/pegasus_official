<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮卡斯 2.0 — AI量化信号引擎</title>
<style>
  :root {
    --bg: #0b0b15; --card: #13132b; --card2: #1a1a3a;
    --accent: #e94560; --accent2: #5333ed; --gold: #f0a500;
    --green: #00e676; --red: #ff1744; --text: #e0e0f0;
    --muted: #8888aa; --border: #252550; --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    background-image: radial-gradient(ellipse at 50% 0%, #1a1040 0%, var(--bg) 70%); }
  .header { text-align:center; padding:50px 20px 30px; }
  .header h1 { font-size:2.6rem; font-weight:900;
    background:linear-gradient(135deg,#e94560,#5333ed,#f0a500);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:2px; }
  .header .badge { display:inline-block; margin-top:8px; padding:4px 14px; border-radius:20px;
    background:rgba(83,51,237,0.2); color:#8b7cf0; font-size:0.78rem; font-weight:600; letter-spacing:1px; }
  .header .sub { color:var(--muted); margin-top:10px; font-size:0.9rem; }
  .container { width:100%; max-width:720px; margin:0 auto; padding:0 20px 40px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:16px; }
  .card h3 { font-size:0.85rem; margin-bottom:14px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }
  .market-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
  .market-btn { background:var(--card2); border:2px solid var(--border); border-radius:var(--radius);
    padding:16px 10px; cursor:pointer; text-align:center; transition:all 0.2s; color:var(--text); font-size:0.88rem; }
  .market-btn:hover { border-color:var(--accent2); background:rgba(83,51,237,0.1); }
  .market-btn.active { border-color:var(--accent); background:rgba(233,69,96,0.1); box-shadow:0 0 20px rgba(233,69,96,0.1); }
  .market-btn .icon { font-size:1.5rem; display:block; margin-bottom:4px; }
  .input-row { display:flex; gap:10px; }
  .input-row input { flex:1; background:var(--card2); border:2px solid var(--border);
    border-radius:var(--radius); padding:14px 16px; color:var(--text); font-size:1rem; outline:none; transition:border 0.2s; }
  .input-row input:focus { border-color:var(--accent); }
  .input-row input::placeholder { color:#555; }
  .presets { margin-top:10px; font-size:0.78rem; color:var(--muted); display:flex; flex-wrap:wrap; gap:4px 8px; }
  .presets span { color:#8b7cf0; cursor:pointer; transition:color 0.2s; }
  .presets span:hover { color:var(--accent); }
  .btn-analyze { width:100%; background:linear-gradient(135deg,#e94560,#5333ed);
    color:#fff; border:none; border-radius:var(--radius); padding:16px; font-size:1.1rem;
    font-weight:700; cursor:pointer; letter-spacing:1px; transition:all 0.2s; margin-top:12px; }
  .btn-analyze:hover { opacity:0.92; transform:translateY(-1px); box-shadow:0 8px 30px rgba(83,51,237,0.3); }
  .btn-analyze:active { transform:scale(0.98); }
  .btn-analyze:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .loading { display:none; text-align:center; padding:30px; }
  .spinner { display:inline-block; width:40px; height:40px; border:3px solid var(--border);
    border-top-color:var(--accent2); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading p { color:var(--muted); margin-top:14px; font-size:0.88rem; }
  .result { display:none; }
  .signal-header { text-align:center; padding:20px 0; }
  .signal-badge { display:inline-block; padding:10px 32px; border-radius:50px;
    font-size:1.6rem; font-weight:900; letter-spacing:3px; margin-bottom:8px; }
  .signal-BUY  { background:rgba(0,230,118,0.12); color:var(--green); border:2px solid var(--green); }
  .signal-SELL { background:rgba(255,23,68,0.12); color:var(--red); border:2px solid var(--red); }
  .signal-HOLD { background:rgba(240,165,0,0.12); color:var(--gold); border:2px solid var(--gold); }
  .scores { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:16px 0; }
  .score-item { background:var(--card2); border-radius:var(--radius); padding:14px 10px; text-align:center; }
  .score-item .val { font-size:1.5rem; font-weight:800; }
  .score-item .lbl { font-size:0.72rem; color:var(--muted); margin-top:4px; text-transform:uppercase; }
  .val.buy { color:var(--green); } .val.sell { color:var(--red); } .val.net { color:var(--gold); }
  .agent-card { background:var(--card2); border-radius:var(--radius); padding:16px; margin-bottom:10px;
    border-left:4px solid var(--border); transition:border-color 0.3s; }
  .agent-card.buy { border-left-color:var(--green); }
  .agent-card.sell { border-left-color:var(--red); }
  .agent-card.hold { border-left-color:var(--gold); }
  .agent-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .agent-name { font-weight:700; font-size:0.95rem; }
  .agent-meta { display:flex; gap:12px; align-items:center; }
  .agent-signal { font-size:0.78rem; font-weight:700; padding:3px 14px; border-radius:16px; letter-spacing:1px; }
  .agent-signal.buy { color:var(--green); background:rgba(0,230,118,0.1); }
  .agent-signal.sell { color:var(--red); background:rgba(255,23,68,0.1); }
  .agent-signal.hold { color:var(--gold); background:rgba(240,165,0,0.1); }
  .agent-conf { font-size:0.75rem; color:var(--muted); }
  .agent-reason { font-size:0.82rem; color:#ccc; line-height:1.5; margin:6px 0; }
  .agent-reasoning { font-size:0.78rem; color:var(--muted); margin-top:8px; padding:10px;
    background:rgba(0,0,0,0.2); border-radius:8px; line-height:1.6;
    max-height:200px; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
    display:none; }
  .agent-reasoning.show { display:block; }
  .reasoning-toggle { font-size:0.72rem; color:var(--accent2); cursor:pointer; margin-top:4px; display:inline-block; }
  .reasoning-toggle:hover { text-decoration:underline; }
  .agent-signals-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  .signal-tag { font-size:0.7rem; padding:2px 8px; border-radius:10px;
    background:rgba(83,51,237,0.15); color:#8b7cf0; }
  .snapshot { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .snap-item { background:var(--card2); border-radius:8px; padding:10px 14px; }
  .snap-item .lbl { font-size:0.7rem; color:var(--muted); }
  .snap-item .val { font-size:0.92rem; font-weight:600; margin-top:2px; }
  .error-msg { display:none; background:rgba(255,23,68,0.08); border:1px solid var(--red);
    color:var(--red); border-radius:var(--radius); padding:16px; margin-top:12px; font-size:0.88rem; }
  .footer { padding:30px; color:var(--muted); font-size:0.75rem; text-align:center; }
  .tab-bar { display:flex; gap:0; margin-bottom:16px; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }
  .tab-btn { flex:1; padding:12px; background:var(--card2); border:none; color:var(--muted); cursor:pointer; font-size:0.88rem; font-weight:600; transition:all 0.2s; }
  .tab-btn:hover { background:rgba(83,51,237,0.1); }
  .tab-btn.active { background:var(--accent2); color:#fff; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }
  .trade-status { text-align:center; padding:16px 0; }
  .trade-action { display:inline-block; padding:8px 24px; border-radius:30px; font-size:1.2rem; font-weight:800; letter-spacing:2px; margin:8px 0; }
  .trade-action.LONG { background:rgba(0,230,118,0.12); color:var(--green); border:2px solid var(--green); }
  .trade-action.SHORT { background:rgba(255,23,68,0.12); color:var(--red); border:2px solid var(--red); }
  .trade-action.HOLD { background:rgba(240,165,0,0.12); color:var(--gold); border:2px solid var(--gold); }
  .trade-action.CLOSE { background:rgba(83,51,237,0.12); color:#8b7cf0; border:2px solid var(--accent2); }
  .risk-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .risk-item { background:var(--card2); border-radius:8px; padding:10px 12px; }
  .risk-item .v { font-size:1rem; font-weight:700; }
  .risk-item .l { font-size:0.68rem; color:var(--muted); }
  .risk-item.warn .v { color:var(--red); }
  .rules-list { margin-top:8px; }
  .rules-list .rule { font-size:0.75rem; padding:4px 0; display:flex; align-items:center; gap:6px; }
  .rules-list .rule.pass::before { content:"✅"; }
  .rules-list .rule.warn::before { content:"⚡"; }
  .rules-list .rule.fail::before { content:"❌"; }
  .auto-controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .auto-controls select { background:var(--card2); border:2px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:0.85rem; }
  .auto-controls label { font-size:0.82rem; color:var(--muted); }
  .countdown { color:var(--accent); font-size:0.82rem; font-weight:600; }
  .pos-badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:0.7rem; font-weight:700; }
  .pos-badge.long { background:rgba(0,230,118,0.15); color:var(--green); }
  .pos-badge.short { background:rgba(255,23,68,0.15); color:var(--red); }
  @media (max-width:500px) {
    .header h1 { font-size:2rem; }
    .market-btn { padding:12px 6px; font-size:0.75rem; }
    .scores { gap:6px; }
    .snapshot { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>皮卡斯 PICAS 2.0</h1>
  <div class="badge">AI x 多Agent 量化信号引擎</div>
  <p class="sub">对标 Brale Dual-Loop · LLM驱动 · 指标共振 · 形态识别 · 趋势判断</p>
</div>

<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('analyze')">🧠 AI 分析</button>
    <button class="tab-btn" onclick="switchTab('trade')">⚡ 交易面板</button>
  </div>

  <!-- 分析面板 -->
  <div class="tab-panel active" id="panel-analyze">
  <div class="card">
    <h3>📍 选择市场</h3>
    <div class="market-grid" id="marketGrid">
      <button class="market-btn active" data-market="gold"><span class="icon">🥇</span>黄金期货</button>
      <button class="market-btn" data-market="us"><span class="icon">🇺🇸</span>美股</button>
      <button class="market-btn" data-market="a"><span class="icon">🇨🇳</span>A股</button>
    </div>
    <div class="input-row">
      <input type="text" id="symbolInput" placeholder="输入代码 (如 AAPL / 600519 / 贵州茅台)">
    </div>
    <div class="presets" id="presetHint"></div>
  </div>
  <button class="btn-analyze" id="btnAnalyze" onclick="runAnalysis()">🧠 AI 深度分析</button>
  <div class="loading" id="loading"><div class="spinner"></div><p>AI Agent 正在推理中...</p></div>
  <div class="error-msg" id="error"></div>

  <div class="result" id="result">
    <div class="card">
      <div class="signal-header">
        <div id="symbolLabel" style="font-size:0.85rem;color:var(--muted);margin-bottom:8px;"></div>
        <div class="signal-badge" id="signalBadge"></div>
        <div style="font-size:0.78rem;color:var(--muted);margin-top:4px;" id="priceLabel"></div>
      </div>
      <div class="scores">
        <div class="score-item"><div class="val buy" id="buyScore">-</div><div class="lbl">买入得分</div></div>
        <div class="score-item"><div class="val sell" id="sellScore">-</div><div class="lbl">卖出得分</div></div>
        <div class="score-item"><div class="val net" id="netScore">-</div><div class="lbl">净得分</div></div>
      </div>
      <h3>🎯 AI Agent 推理结果</h3>
      <div id="agentList"></div>
      <h3 style="margin-top:14px;">📊 指标快照</h3>
      <div class="snapshot" id="indicatorSnapshot"></div>
    </div>
  </div>
  </div>

  <!-- 交易面板 -->
  <div class="tab-panel" id="panel-trade">
    <div class="card">
      <h3>💰 账户设置</h3>
      <div class="risk-grid">
        <div>
          <label style="font-size:0.75rem;color:var(--muted);">账户净值 ($)</label>
          <div class="input-row" style="margin-top:4px;">
            <input type="number" id="equityInput" value="10000" min="100" step="100" style="width:100%;padding:10px;">
          </div>
        </div>
        <div>
          <label style="font-size:0.75rem;color:var(--muted);">单笔风险 (%)</label>
          <div class="input-row" style="margin-top:4px;">
            <input type="number" id="riskInput" value="2" min="0.5" max="10" step="0.5" style="width:100%;padding:10px;">
          </div>
        </div>
      </div>
      <div class="risk-grid" style="margin-top:8px;">
        <div>
          <label style="font-size:0.75rem;color:var(--muted);">风报比</label>
          <div class="input-row" style="margin-top:4px;">
            <select id="rrInput" style="width:100%;padding:10px;background:var(--card2);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);">
              <option value="1.5">1.5 : 1</option>
              <option value="2.0" selected>2.0 : 1</option>
              <option value="2.5">2.5 : 1</option>
              <option value="3.0">3.0 : 1</option>
            </select>
          </div>
        </div>
        <div>
          <label style="font-size:0.75rem;color:var(--muted);">当前持仓</label>
          <div style="margin-top:4px;padding:10px;background:var(--card2);border-radius:var(--radius);min-height:38px;" id="posDisplay">空仓</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>⏱️ 自动分析</h3>
      <div class="auto-controls">
        <label>间隔:</label>
        <select id="intervalSelect" onchange="updateInterval()">
          <option value="0">手动</option>
          <option value="15">15分钟</option>
          <option value="30">30分钟</option>
          <option value="60" selected>1小时</option>
          <option value="120">2小时</option>
          <option value="240">4小时</option>
        </select>
        <span class="countdown" id="countdown"></span>
      </div>
    </div>

    <button class="btn-analyze" id="btnTrade" onclick="runTrade()" style="margin-top:0;">🎯 执行交易分析</button>
    <div class="loading" id="tradeLoading"><div class="spinner"></div><p>操盘手+风控师 分析中...</p></div>
    <div class="error-msg" id="tradeError"></div>

    <div class="result" id="tradeResult">
      <div class="card">
        <div class="trade-status" id="tradeStatus">
          <div style="font-size:0.85rem;color:var(--muted);" id="tradeMarketLabel"></div>
          <div class="trade-action" id="tradeActionBadge">HOLD</div>
          <div id="tradeDetail" style="font-size:0.82rem;color:var(--muted);"></div>
        </div>
        <div class="scores" id="tradeMetrics" style="margin:12px 0;"></div>
        <h3>🛡️ 风控参数</h3>
        <div id="riskParams"></div>
        <h3 style="margin-top:10px;">📋 风控规则检查</h3>
        <div class="rules-list" id="rulesCheck"></div>
      </div>
    </div>
  </div>

</div>
<div class="footer">皮卡斯 Picas 2.0 · AI驱动的多Agent量化信号引擎 · 数据仅供参考，不构成投资建议</div>

<script>
// ===== Railway 后端 API 地址 =====
var API_BASE = 'https://pegasusofficial-production.up.railway.app';
// =================================
var currentMarket='gold';
const presets={
  gold:[["GC=F","黄金期货"],["AU0","上期所黄金"]],
  us:[["AAPL","苹果"],["TSLA","特斯拉"],["MSFT","微软"],["NVDA","英伟达"],["SPY","标普500"],["QQQ","纳指100"],["AMZN","亚马逊"],["GOOGL","谷歌"],["META","Meta"]],
  a:[["600519","贵州茅台"],["000858","五粮液"],["300750","宁德时代"],["000001","平安银行"],["002594","比亚迪"],["601318","中国平安"],["600036","招商银行"]]
};

document.querySelectorAll('.market-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.market-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    currentMarket=btn.dataset.market;
    updatePresets();

// ===== 交易面板逻辑 =====
var tradeTimer=null, countdownTimer=null, currentPos=null;

// Tab 切换
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
  event.target.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

// 更新间隔
function updateInterval(){
  clearInterval(tradeTimer);
  clearInterval(countdownTimer);
  var v=parseInt(document.getElementById('intervalSelect').value);
  document.getElementById('countdown').textContent='';
  if(v>0){
    document.getElementById('countdown').textContent='下一次: '+v+'分钟后';
    var remaining=v*60;
    countdownTimer=setInterval(function(){
      remaining--;
      if(remaining<=0){remaining=v*60; autoTrade();}
      var m=Math.floor(remaining/60),s=remaining%60;
      document.getElementById('countdown').textContent='倒计时: '+m+'分'+s+'秒';
    },1000);
    autoTrade(); // 立即执行第一次
  }
}

// 自动交易
function autoTrade(){
  // 检查是否在交易面板标签页
  var tp=document.getElementById('panel-trade');
  if(!tp.classList.contains('active')) return;
  runTrade();
}

// 加载持仓状态
function loadPortfolio(){
  try{
    var saved=localStorage.getItem('picas_portfolio');
    if(saved) currentPos=JSON.parse(saved);
    else currentPos=null;
  }catch(e){currentPos=null;}
  updatePosDisplay();
}
function savePortfolio(pos){
  currentPos=pos;
  try{localStorage.setItem('picas_portfolio',JSON.stringify(pos||{}));}catch(e){}
  updatePosDisplay();
}
function updatePosDisplay(){
  var d=document.getElementById('posDisplay');
  if(currentPos && currentPos.type){
    var cls=currentPos.type, icon=cls==='long'?'🟢':'🔴';
    d.innerHTML=icon+' <span class="pos-badge '+cls+'">'+(cls==='long'?'做多':'做空')+'</span> @'+currentPos.entry_price+' 手数:'+currentPos.size+' SL:'+(currentPos.stop_loss||'N/A');
  }else{
    d.innerHTML='空仓';
  }
}

// 执行交易分析
async function runTrade(){
  var b=document.getElementById('btnTrade'),
      l=document.getElementById('tradeLoading'),
      r=document.getElementById('tradeResult'),
      e=document.getElementById('tradeError');
  r.style.display='none'; e.style.display='none';
  b.disabled=true; l.style.display='block';
  
  var equity=parseFloat(document.getElementById('equityInput').value)||10000;
  var risk=parseFloat(document.getElementById('riskInput').value)/100||0.02;
  var rr=parseFloat(document.getElementById('rrInput').value)||2.0;
  var s=document.getElementById('symbolInput').value.trim();
  
  var u=API_BASE+'/trade?market='+currentMarket+'&equity='+equity+'&risk_per_trade='+risk;
  if(s) u+='&symbol='+encodeURIComponent(s);
  
  // 附加持仓
  loadPortfolio();
  if(currentPos && currentPos.type){
    u+='&pos_type='+currentPos.type+'&pos_entry='+(currentPos.entry_price||0)+'&pos_size='+(currentPos.size||0)+'&pos_sl='+(currentPos.stop_loss||0);
  }
  
  try{
    var resp=await fetch(u);
    if(!resp.ok){var j=await resp.json();throw new Error(j.error||'HTTP '+resp.status)}
    var d=await resp.json();
    renderTrade(d);
    // 保存持仓状态
    if(d.trader && d.trader.action!=='HOLD'){
      // 简化: 如果开仓则更新持仓
      var ac=d.trader.action;
      if(ac==='LONG'||ac==='SHORT'){
        var stops=d.risk_manager&&d.risk_manager.stops;
        var sl=stops?stops.final_stop_loss.price:0;
        savePortfolio({
          type:ac.toLowerCase(),
          entry_price:d.trader.entry_price||d.price,
          size:d.trader.size||0,
          stop_loss:sl
        });
      }else if(ac==='CLOSE'){
        savePortfolio(null);
      }
    }
  }catch(err){
    e.textContent='❌ '+err.message; e.style.display='block';
  }finally{b.disabled=false;l.style.display='none'}
}

// 渲染交易结果
function renderTrade(d){
  document.getElementById('tradeResult').style.display='block';
  
  var n={gold:'🥇 黄金期货',us:'🇺🇸 美股',a:'🇨🇳 A股'};
  document.getElementById('tradeMarketLabel').textContent=(n[currentMarket]||currentMarket)+' · '+(d.symbol||'-')+' | 价格: $'+(d.price||'N/A');
  
  // 交易信号
  if(d.summary){
    var s=d.summary;
    document.getElementById('tradeActionBadge').textContent=s.title||'HOLD';

function updatePresets(){
  var h=document.getElementById('presetHint'),items=presets[currentMarket]||[];
  h.innerHTML=items.map(function(p){return '<span onclick="fillSymbol(\''+p[0]+'\')">'+p[1]+'</span>'}).join(' · ');
}
function fillSymbol(s){document.getElementById('symbolInput').value=s}
function hideResult(){
  document.getElementById('result').style.display='none';
  document.getElementById('error').style.display='none';
}
document.getElementById('symbolInput').addEventListener('keydown',function(e){if(e.key==='Enter')runAnalysis()});

async function runAnalysis(){
  var s=document.getElementById('symbolInput').value.trim(),
      b=document.getElementById('btnAnalyze'),
      l=document.getElementById('loading'),
      e=document.getElementById('error');
  hideResult(); b.disabled=true; l.style.display='block';
  try{
    var u=API_BASE+'/analyze?market='+currentMarket;
    if(s) u+='&symbol='+encodeURIComponent(s);
    var r=await fetch(u);
    if(!r.ok){var j=await r.json();throw new Error(j.error||'HTTP '+r.status)}
    var d=await r.json();renderResult(d,s);
  }catch(err){
    e.textContent='❌ '+err.message; e.style.display='block';
  }finally{b.disabled=false;l.style.display='none'}
}

var tradeTimer=null, countdownTimer=null, currentPos=null;

// Tab 切换
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
  event.target.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

// 更新间隔
function updateInterval(){
  clearInterval(tradeTimer);
  clearInterval(countdownTimer);
  var v=parseInt(document.getElementById('intervalSelect').value);
  document.getElementById('countdown').textContent='';
  if(v>0){
    document.getElementById('countdown').textContent='下一次: '+v+'分钟后';
    var remaining=v*60;
    countdownTimer=setInterval(function(){
      remaining--;
      if(remaining<=0){remaining=v*60; autoTrade();}
      var m=Math.floor(remaining/60),s=remaining%60;
      document.getElementById('countdown').textContent='倒计时: '+m+'分'+s+'秒';
    },1000);
    autoTrade(); // 立即执行第一次
  }
}

// 自动交易
function autoTrade(){
  // 检查是否在交易面板标签页
  var tp=document.getElementById('panel-trade');
  if(!tp.classList.contains('active')) return;
  runTrade();
}

// 加载持仓状态
function loadPortfolio(){
  try{
    var saved=localStorage.getItem('picas_portfolio');
    if(saved) currentPos=JSON.parse(saved);
    else currentPos=null;
  }catch(e){currentPos=null;}
  updatePosDisplay();
}
function savePortfolio(pos){
  currentPos=pos;
  try{localStorage.setItem('picas_portfolio',JSON.stringify(pos||{}));}catch(e){}
  updatePosDisplay();
}
function updatePosDisplay(){
  var d=document.getElementById('posDisplay');
  if(currentPos && currentPos.type){
    var cls=currentPos.type, icon=cls==='long'?'🟢':'🔴';
    d.innerHTML=icon+' <span class="pos-badge '+cls+'">'+(cls==='long'?'做多':'做空')+'</span> @'+currentPos.entry_price+' 手数:'+currentPos.size+' SL:'+(currentPos.stop_loss||'N/A');
  }else{
    d.innerHTML='空仓';
  }
}

// 执行交易分析
async function runTrade(){
  var b=document.getElementById('btnTrade'),
      l=document.getElementById('tradeLoading'),
      r=document.getElementById('tradeResult'),
      e=document.getElementById('tradeError');
  r.style.display='none'; e.style.display='none';
  b.disabled=true; l.style.display='block';
  
  var equity=parseFloat(document.getElementById('equityInput').value)||10000;
  var risk=parseFloat(document.getElementById('riskInput').value)/100||0.02;
  var rr=parseFloat(document.getElementById('rrInput').value)||2.0;
  var s=document.getElementById('symbolInput').value.trim();
  
  var u=API_BASE+'/trade?market='+currentMarket+'&equity='+equity+'&risk_per_trade='+risk;
  if(s) u+='&symbol='+encodeURIComponent(s);
  
  // 附加持仓
  loadPortfolio();
  if(currentPos && currentPos.type){
    u+='&pos_type='+currentPos.type+'&pos_entry='+(currentPos.entry_price||0)+'&pos_size='+(currentPos.size||0)+'&pos_sl='+(currentPos.stop_loss||0);
  }
  
  try{
    var resp=await fetch(u);
    if(!resp.ok){var j=await resp.json();throw new Error(j.error||'HTTP '+resp.status)}
    var d=await resp.json();
    renderTrade(d);
    // 保存持仓状态
    if(d.trader && d.trader.action!=='HOLD'){
      // 简化: 如果开仓则更新持仓
      var ac=d.trader.action;
      if(ac==='LONG'||ac==='SHORT'){
        var stops=d.risk_manager&&d.risk_manager.stops;
        var sl=stops?stops.final_stop_loss.price:0;
        savePortfolio({
          type:ac.toLowerCase(),
          entry_price:d.trader.entry_price||d.price,
          size:d.trader.size||0,
          stop_loss:sl
        });
      }else if(ac==='CLOSE'){
        savePortfolio(null);
      }
    }
  }catch(err){
    e.textContent='❌ '+err.message; e.style.display='block';
  }finally{b.disabled=false;l.style.display='none'}
}
