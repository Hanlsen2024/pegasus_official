<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮卡斯 Picas — 智能交易信号分析</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --gold: #f0a500;
    --green: #00c853;
    --red: #ff1744;
    --text: #e0e0e0;
    --muted: #888;
    --border: #2a2a4a;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  /* Header */
  .header {
    text-align: center;
    padding: 40px 20px 20px;
  }
  .header h1 {
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }
  .header .sub {
    color: var(--muted);
    margin-top: 6px;
    font-size: 0.95rem;
  }
  
  /* Container */
  .container {
    width: 100%;
    max-width: 640px;
    padding: 0 20px;
  }
  
  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
  }
  .card h3 {
    font-size: 1rem;
    margin-bottom: 16px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  /* Market selector */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .market-btn {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    color: var(--text);
    font-size: 0.9rem;
  }
  .market-btn:hover { border-color: var(--accent2); }
  .market-btn.active {
    border-color: var(--accent);
    background: rgba(233,69,96,0.1);
  }
  .market-btn .icon { font-size: 1.6rem; display: block; margin-bottom: 6px; }
  
  /* Symbol input */
  .input-group {
    display: flex;
    gap: 10px;
  }
  .input-group input, .input-group select {
    flex: 1;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: var(--accent);
  }
  .input-group input::placeholder { color: #555; }
  .preset-hint {
    margin-top: 8px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .preset-hint span {
    color: var(--gold);
    cursor: pointer;
    text-decoration: underline;
    margin: 0 3px;
  }
  
  /* Button */
  .btn-analyze {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #c23152);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-analyze:hover { opacity: 0.9; }
  .btn-analyze:active { transform: scale(0.98); }
  .btn-analyze:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: var(--muted);
  }
  .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* Result */
  .result {
    display: none;
    margin-top: 20px;
  }
  .signal-badge {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 50px;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .signal-BUY  { background: rgba(0,200,83,0.15); color: var(--green); border: 2px solid var(--green); }
  .signal-SELL { background: rgba(255,23,68,0.15); color: var(--red); border: 2px solid var(--red); }
  .signal-HOLD { background: rgba(240,165,0,0.15); color: var(--gold); border: 2px solid var(--gold); }
  
  .scores {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .score-item {
    background: var(--card2);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .score-item .val {
    font-size: 1.6rem;
    font-weight: 800;
  }
  .score-item .lbl {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .val.buy  { color: var(--green); }
  .val.sell { color: var(--red); }
  .val.net  { color: var(--gold); }
  
  /* Analyst cards */
  .analyst-list {
    display: grid;
    gap: 8px;
  }
  .analyst-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card2);
    border-radius: var(--radius);
    padding: 12px 16px;
    border-left: 4px solid var(--border);
  }
  .analyst-item.buy  { border-left-color: var(--green); }
  .analyst-item.sell { border-left-color: var(--red); }
  .analyst-item.hold { border-left-color: var(--gold); }
  .analyst-name { font-weight: 600; }
  .analyst-desc { font-size: 0.78rem; color: var(--muted); }
  .analyst-signal {
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .analyst-signal.buy  { color: var(--green); background: rgba(0,200,83,0.1); }
  .analyst-signal.sell { color: var(--red);  background: rgba(255,23,68,0.1); }
  .analyst-signal.hold { color: var(--gold); background: rgba(240,165,0,0.1); }
  
  .symbol-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 10px;
  }
  
  /* Error */
  .error-msg {
    display: none;
    background: rgba(255,23,68,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 12px;
    font-size: 0.9rem;
  }
  
  /* Footer */
  .footer {
    padding: 30px;
    color: var(--muted);
    font-size: 0.78rem;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <h1>皮卡斯 PICAS</h1>
  <p class="sub">多市场 · 多分析师 · 加权投票 · 智能交易信号</p>
</div>

<div class="container">
  
  <!-- Market Selection -->
  <div class="card">
    <h3>📍 选择市场</h3>
    <div class="market-grid" id="marketGrid">
      <button class="market-btn active" data-market="gold">
        <span class="icon">🥇</span> 黄金期货
      </button>
      <button class="market-btn" data-market="us">
        <span class="icon">🇺🇸</span> 美股
      </button>
      <button class="market-btn" data-market="a">
        <span class="icon">🇨🇳</span> A股
      </button>
    </div>
    
    <div class="input-group">
      <input type="text" id="symbolInput" placeholder="输入股票代码 (如 AAPL / 600519 / 贵州茅台)">
    </div>
    <div class="preset-hint" id="presetHint">
      常用标的：<span onclick="fillSymbol('GC=F')">GC=F</span>
    </div>
  </div>
  
  <!-- Analyze Button -->
  <button class="btn-analyze" id="btnAnalyze" onclick="run()">⚡ 开始分析</button>
  
  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top:12px">分析师正在投票中...</p>
  </div>
  
  <!-- Error -->
  <div class="error-msg" id="error"></div>
  
  <!-- Result -->
  <div class="result" id="result">
    <div class="card">
      <div class="symbol-label" id="symbolLabel"></div>
      <div class="signal-badge" id="signalBadge"></div>
      
      <div class="scores">
        <div class="score-item">
          <div class="val buy" id="buyScore">-</div>
          <div class="lbl">买入得分</div>
        </div>
        <div class="score-item">
          <div class="val sell" id="sellScore">-</div>
          <div class="lbl">卖出得分</div>
        </div>
        <div class="score-item">
          <div class="val net" id="netScore">-</div>
          <div class="lbl">净得分</div>
        </div>
      </div>
      
      <h3>🎯 分析师投票</h3>
      <div class="analyst-list" id="analystList"></div>
    </div>
  </div>
  
</div>

<div class="footer">
  皮卡斯 Picas v1.0.0 &nbsp;|&nbsp; 
  数据仅供参考，不构成投资建议
</div>

<script>
let currentMarket = 'gold';

// Market selector
document.querySelectorAll('.market-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.market-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMarket = btn.dataset.market;
    updatePresets();
    document.getElementById('symbolInput').value = '';
    hideResult();
  });
});

// Presets
const presets = {
  gold: [["GC=F","黄金期货"], ["AU0","上期所黄金"]],
  us:   [["AAPL","苹果"], ["TSLA","特斯拉"], ["MSFT","微软"], ["NVDA","英伟达"], ["SPY","标普500"], ["QQQ","纳指100"], ["AMZN","亚马逊"], ["GOOGL","谷歌"], ["META","Meta"], ["AMD","AMD"]],
  a:    [["600519","贵州茅台"], ["000858","五粮液"], ["300750","宁德时代"], ["000001","平安银行"], ["600036","招商银行"], ["002594","比亚迪"], ["601318","中国平安"], ["600276","恒瑞医药"]]
};

function updatePresets() {
  const hint = document.getElementById('presetHint');
  const items = presets[currentMarket] || [];
  hint.innerHTML = '常用标的：' + items.map(i => 
    `<span onclick="fillSymbol('${i[0]}')">${i[1]}</span>`
  ).join(' ');
}

function fillSymbol(sym) {
  document.getElementById('symbolInput').value = sym;
}

// Keyboard: Enter to trigger
document.getElementById('symbolInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') run();
});

function hideResult() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';
}

async function run() {
  const symbol = document.getElementById('symbolInput').value.trim();
  const btn = document.getElementById('btnAnalyze');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const error = document.getElementById('error');
  
  hideResult();
  btn.disabled = true;
  loading.style.display = 'block';
  
  try {
    let url = `/analyze?market=${currentMarket}`;
    if (symbol) url += `&symbol=${encodeURIComponent(symbol)}`;
    
    const resp = await fetch(url);
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    
    const data = await resp.json();
    renderResult(data, symbol);
    
  } catch (err) {
    error.textContent = '❌ ' + err.message;
    error.style.display = 'block';
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function renderResult(data, symbol) {
  const result = document.getElementById('result');
  result.style.display = 'block';
  
  // Symbol label
  const marketNames = { gold: '黄金期货', us: '美股', a: 'A股' };
  document.getElementById('symbolLabel').textContent = 
    `${marketNames[currentMarket] || currentMarket} · ${data.symbol || symbol || '-'}`;
  
  // Signal badge
  const badge = document.getElementById('signalBadge');
  badge.textContent = data.signal || '-';
  badge.className = 'signal-badge signal-' + (data.signal || 'HOLD');
  
  // Scores
  document.getElementById('buyScore').textContent = data.buy_score?.toFixed(2) || '-';
  document.getElementById('sellScore').textContent = data.sell_score?.toFixed(2) || '-';
  document.getElementById('netScore').textContent = data.net_score?.toFixed(2) || '-';
  
  // Analyst votes
  const list = document.getElementById('analystList');
  list.innerHTML = '';
  if (data.analyst_votes) {
    data.analyst_votes.forEach(v => {
      const cls = (v.signal || '').toLowerCase();
      list.innerHTML += `
        <div class="analyst-item ${cls}">
          <div>
            <div class="analyst-name">${v.name}</div>
            <div class="analyst-desc">${v.reason || ''}</div>
          </div>
          <span class="analyst-signal ${cls}">${v.signal}</span>
        </div>`;
    });
  }
}

// Init
updatePresets();
</script>

</body>
</html>
