# =============================================================================
# 皮卡斯 2.0 — AI驱动的多智能体量化信号引擎 配置文件
# 对标 Brale 架构: 快慢双循环 + 多Agent LLM推理 + 指标计算库
# =============================================================================

# ---------------------------------------------------------------------------
# LLM 配置 (支持 OpenAI 兼容协议: GPT / Claude / DeepSeek / 国产模型)
# ---------------------------------------------------------------------------
llm:
  provider: "deepseek"        # openai | deepseek | custom
  api_key: "${LLM_API_KEY}"   # 环境变量 LLM_API_KEY
  base_url: "https://api.deepseek.com/v1"   # DeepSeek 兼容 OpenAI 协议
  model: "deepseek-chat"      # deepseek-chat | deepseek-reasoner
  temperature: 0.3            # 降低随机性，提高信号一致性
  max_tokens: 800
  timeout: 30                 # 超时(秒)

# ---------------------------------------------------------------------------
# 双循环调度器
# ---------------------------------------------------------------------------
scheduler:
  slow_loop_interval: 300     # 慢循环间隔(秒) - AI推理周期
  fast_loop_interval: 5       # 快循环间隔(秒) - 止盈止损监控
  max_concurrent_symbols: 5   # 最大并发标的数

# ---------------------------------------------------------------------------
# Agent 配置
# ---------------------------------------------------------------------------
agents:
  indicator:
    enabled: true
    weight: 1.2
    role: |
      你是一位资深量化分析师，专注于技术指标的「趋势共振」分析。
      你的任务是根据提供的多周期指标数据(EMA, RSI, MACD, 布林带, ATR)，
      判断当前是否存在指标之间的共振信号。
  pattern:
    enabled: true
    weight: 1.0
    role: |
      你是一位价格行为专家，擅长识别K线形态、支撑阻力位和SMC流动性区域。
      请根据提供的价格数据和支撑阻力数据，识别当前是否有显著的形态信号。
  trend:
    enabled: true
    weight: 1.0
    role: |
      你是一位多周期趋势分析师，专注于过滤市场噪音，识别大级别的结构方向。
      请根据多时间框架的趋势数据，判断当前的主要趋势方向和潜在转折点。
  trader:
    enabled: true
    weight: 1.2
    role: |
      你是一位专业的量化交易操盘手，拥有十年实战经验。
      你的核心职责是根据 AI 分析师团队的信号、当前持仓状态和账户净值，做出最佳的买卖决策。
  risk_manager:
    enabled: true
    weight: 1.0
    risk_params:
      atr_stop_multiplier: 2.0
      trail_trigger_atr: 1.5
      trail_distance_atr: 1.0
      breakeven_trigger_atr: 1.0
      hard_stop_pct: 0.05
      risk_reward_ratio: 2.0

# ---------------------------------------------------------------------------
# 市场配置
# ---------------------------------------------------------------------------
markets:
  gold:
    name: "黄金期货"
    symbol: "GC=F"
    timeframes: ["4h", "1d"]
    agents: ["indicator", "pattern", "trend"]
  us_stock:
    name: "美股"
    timeframes: ["1d"]
    agents: ["indicator", "pattern", "trend"]
    presets:
      AAPL: "苹果"
      TSLA: "特斯拉"
      MSFT: "微软"
      NVDA: "英伟达"
      SPY: "标普500"
      QQQ: "纳指100"
      AMZN: "亚马逊"
      GOOGL: "谷歌"
      META: "Meta"
  a_stock:
    name: "A股"
    timeframes: ["1d"]
    agents: ["indicator", "pattern", "trend"]
    presets:
      "600519": "贵州茅台"
      "000858": "五粮液"
      "300750": "宁德时代"
      "000001": "平安银行"
      "002594": "比亚迪"
      "601318": "中国平安"

# ---------------------------------------------------------------------------
# 风控与出场策略
# ---------------------------------------------------------------------------
risk:
  default_tp_pct: 5.0        # 默认止盈百分比
  default_sl_pct: 3.0        # 默认止损百分比
  atr_trailing_mult: 2.0     # ATR跟踪止损倍数
  ladder_tp:                  # 阶梯止盈
    - pct: 2.0
      close_ratio: 0.3
    - pct: 5.0
      close_ratio: 0.4
    - pct: 10.0
      close_ratio: 0.3
